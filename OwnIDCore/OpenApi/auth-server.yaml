      enum:
        - public-key
    TransportType:
      type: string
      enum:
        - usb
        - nfc
        - ble
        - smart-card
        - hybrid
        - internal
        - cable
    KeyAlgorithmType:
      type: integer
      description: The cryptographic algorithm to be used in COSE format
      enum:
        - -7
        - -257
    PublicKeyCredentialDescriptor:
      type: object
      required:
        - type
        - id
      properties:
        type:
          $ref: '#/components/schemas/CredentialType'
        id:
