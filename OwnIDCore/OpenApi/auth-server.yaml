          $ref: '#/components/schemas/ChallengeContext'
      required:
        - status
    DeferChallengeRequest:
      type: object
      properties:
        challengeId:
          $ref: '#/components/schemas/ChallengeId'
      required:
        - challengeId
    CompleteDeferChallengeRequest:
      type: object
      properties:
        challengeId:
          $ref: '#/components/schemas/ChallengeId'
        context:
          $ref: '#/components/schemas/ChallengeContext'
      required:
        - challengeId
    ChallengeStatusCheckResponse:
      allOf:
