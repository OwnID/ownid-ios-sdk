            - aborted
            - in-progress
            - completed
            - switched
            - failed
        startedAt:
          $ref: '#/components/schemas/Timestamp'
        completedAt:
          $ref: '#/components/schemas/Timestamp'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ClientError'
        switchedToFlow:
          type: string
        insights:
          $ref: '#/components/schemas/FlowInsights'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/Step'
      required:
        - id
        - source
        - status
        - startedAt
        - steps
    ClientError:
      type: object
      properties:
        errorCode:
          type: string
        source:
          type: string
        message:
          type: string
      required:
        - errorCode
    FlowInsights:
      type: object
      properties:
        duration:
          $ref: '#/components/schemas/Duration'
        errorRate:
          type: number
          format: float
          description: Percentage of errors encountered in the flow
        retries:
          type: integer
        clicksCount:
          type: integer
        authMethod:
          $ref: '#/components/schemas/AuthMethod'
        loggedIn:
          type: boolean
          description: Indicates if the user was logged in
        registered:
          type: boolean
          description: Indicates if the user was registered
    Step:
      type: object
      properties:
        operationType:
          $ref: '#/components/schemas/OperationType'
        name:
          type: string
        status:
          type: string
          enum:
            - aborted
            - in-progress
            - completed
            - failed
        startedAt:
          $ref: '#/components/schemas/Timestamp'
        completedAt:
          $ref: '#/components/schemas/Timestamp'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ClientError'
        insights:
          $ref: '#/components/schemas/StepInsights'
      required:
        - operationType
        - status
        - startedAt
    StepInsights:
      type: object
      properties:
        duration:
          $ref: '#/components/schemas/Duration'
        retries:
          type: integer
        clicksCount:
          type: integer
    ClientDeviceInfo:
      type: object
      properties:
        isPlatformAuthenticatorAvailable:
          type: boolean
        isWebView:
          type: boolean
        isMobileNative:
          type: boolean
      required:
        - isPlatformAuthenticatorAvailable
        - isWebView
        - isMobileNative
    UserInfo:
      type: object
      properties:
        loginId:
          $ref: '#/components/schemas/LoginId'
        returningUser:
          type: boolean
        lastAuthMethod:
          $ref: '#/components/schemas/AuthMethod'
      required:
        - loginId
    Duration:
      type: integer
      format: int64
      description: Duration in milliseconds
    Timestamp:
      type: string
      format: date-time
      description: UTC timestamp
    OidcChallengeResponse:
      type: object
      required:
        - challengeId
        - timeout
        - clientId
      properties:
        challengeId:
          $ref: '#/components/schemas/ChallengeId'
        timeout:
          $ref: '#/components/schemas/Timeout'
        clientId:
          type: string
          description: The client ID of the OIDC provider
        challengeUrl:
          type: string
          description: >-
            The URL to navigate to in order to face the challenge, will be
            provided if using web flow
    StartOidcChallengeRequest:
      type: object
      properties:
        loginIdHint:
          type: string
          description: A login ID hint for the OIDC provider
        oauthResponseType:
          type: string
          description: >-
            The response type that will be used to resolve the challenge.
            Currently only a subset of the types in the protocol are supported
          enum:
            - code
            - id_token
        redirectUri:
          type: string
          description: >-
            The redirect URI to be used in an OIDC web flow, defaults to the
            preconfigured app's redirect uri
      required:
        - oauthResponseType
    CompleteOidcChallengeRequest:
      oneOf:
        - type: object
          properties:
            challengeId:
              $ref: '#/components/schemas/ChallengeId'
            code:
              type: string
              description: The authorization code returned by the OIDC provider
          required:
            - challengeId
            - code
        - type: object
          properties:
            challengeId:
              $ref: '#/components/schemas/ChallengeId'
            idToken:
              type: string
              description: The ID token returned by the OIDC provider
          required:
            - idToken
            - challengeId
    CancelOidcChallengeRequest:
      type: object
      properties:
        challengeId:
          $ref: '#/components/schemas/ChallengeId'
        reason:
          $ref: '#/components/schemas/CancelReason'
      required:
        - challengeId
    AccessTokenWithUserInfoResponse:
      allOf:
        - $ref: '#/components/schemas/AccessTokenResponse'
        - type: object
          properties:
            loginId:
              $ref: '#/components/schemas/LoginId'
            userInfo:
              type: object
              description: The user information
              additionalProperties:
                type: string
            provider:
              $ref: '#/components/schemas/OidcProvider'
          required:
            - userInfo
            - loginId
            - provider
    StartIdDocVerificationRequest:
      type: object
      properties:
        loginId:
          $ref: '#/components/schemas/LoginId'
        finishUrl:
          type: string
          description: >-
            A URL that the user will be redirected to after completing the iddoc
            verification challenge, or empty if no redirection is needed
        sendNotification:
          type: boolean
          description: >-
            Indicates whether a notification should be sent to the user to
            prompt them to complete the iddoc verification challenge
    StartIdDocVerificationResponse:
      type: object
      properties:
        challengeId:
          $ref: '#/components/schemas/ChallengeId'
        timeout:
          $ref: '#/components/schemas/Timeout'
        challengeUrl:
          type: string
          description: >-
            A URL that the user can open to complete the iddoc verification
            challenge
      required:
        - challengeId
        - timeout
        - challengeUrl
    IdDocChallengeRequest:
      type: object
      properties:
        challengeId:
          $ref: '#/components/schemas/ChallengeId'
      required:
        - challengeId
    CancelIdDocVerificationRequest:
      type: object
      description: Request payload for canceling a challenge operation.
      required:
        - challengeId
      properties:
        challengeId:
          $ref: '#/components/schemas/ChallengeId'
        reason:
          $ref: '#/components/schemas/CancelReason'
    IdDocChallengeStatusCheckResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ChallengeStatus'
        result:
          allOf:
            - $ref: '#/components/schemas/AccessTokenResponse'
            - type: object
              properties:
                documentData:
                  type: object
                  additionalProperties: true
                documentFile:
                  $ref: '#/components/schemas/FilePayload'
                selfieImage:
                  $ref: '#/components/schemas/FilePayload'
              required:
                - documentData
                - documentFile
                - selfieImage
      required:
        - status
    FilePayload:
      type: object
      description: Represents a file payload with its contents and MIME type.
      properties:
        fileContents:
          type: string
          description: The raw contents of a file.
        contentType:
          type: string
          description: The MIME type of the file.
      required:
        - fileContents
        - contentType
    AppAuthConfig:
      type: object
      required:
        - loginIdConfig
      properties:
        displayName:
          type: string
          description: Application display name
        loginIdConfig:
          type: array
          description: Settings related to login ID types
          items:
            type: object
            properties:
              type:
                $ref: '#/components/schemas/LoginIdType'
              regex:
                type: string
            required:
              - type
        webView:
          $ref: '#/components/schemas/WebViewConfig'
        capabilities:
          type: array
          description: Configuration regarding app capabilities
          items:
            $ref: '#/components/schemas/CapabilityConfig'
        ui:
          $ref: '#/components/schemas/UIConfig'
        logLevel:
          $ref: '#/components/schemas/LogLevel'
    LogLevel:
      type: string
      enum:
        - Error
        - Warning
        - Information
        - Debug
        - None
    UIConfig:
      type: object
      description: UI configuration with theme-specific assets
      required:
        - default
      properties:
        default:
          $ref: '#/components/schemas/UIThemeConfig'
        dark:
          $ref: '#/components/schemas/UIThemeConfig'
    UIThemeConfig:
      type: object
      properties:
        logoUrl:
          type: string
          format: uri
          description: Theme-specific logo URL
    WebViewConfig:
      type: object
      properties:
        baseUrl:
          type: string
          format: uri
          description: Base URL for the webview
        html:
          type: string
          description: HTML content for the webview
        allowedOrigins:
          type: array
          items:
            type: string
          description: Allowed webview origins
    CapabilityConfig:
      oneOf:
        - type: object
          properties:
            type:
              type: string
              const: Salesforce
            clientId:
              type: string
              description: OCAPI client ID
            siteId:
              type: string
              description: OCAPI site ID
          required:
            - type
            - clientId
            - siteId
        - type: object
          properties:
            type:
              type: string
              const: Unico
            env:
              type: string
              enum:
                - Production
                - UAT
            sdkKey:
              type: string
              description: Unico SDK key
          required:
            - type
            - sdkKey
            - env
        - type: object
          properties:
            type:
              type: string
              const: Okta
            idpId:
              type: string
              description: Okta Identity Provider ID
          required:
            - type
            - idpId
  responses:
    BadLoginIdRequestErrorResponse:
      description: Bad request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/LoginIdValidationError'
              - $ref: '#/components/schemas/LoginIdTypeNotSupportedError'
              - $ref: '#/components/schemas/UnknownError'
    BadRequestErrorResponse:
      description: Bad request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/UnknownError'
    BadEnrollRequestErrorResponse:
      description: Bad request while validating a proof token.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/UnknownError'
    BadChallengeRequestErrorResponse:
      description: Bad request against an existing challenge.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/InvalidChallengeError'
              - $ref: '#/components/schemas/MaximumAttemptsReachedError'
              - $ref: '#/components/schemas/UnknownError'
    UnauthorizedErrorResponse:
      description: >-
        Unauthorized. The response may include a JSON error message or be
        returned without a body.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/UnauthorizedError'
    ForbiddenErrorResponse:
      description: >-
        Forbidden. The response may include a JSON error message or be returned
        without a body.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ForbiddenError'
    NotFoundErrorResponse:
      description: Not found.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/UserNotFoundError'
    FailedDependencyErrorResponse:
      description: Provider or capability dependency failed.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ProviderError'
              - $ref: '#/components/schemas/MissingProviderError'
    TooManyRequestsErrorResponse:
      description: Too many active challenges or concurrent attempts.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MaximumChallengesReachedError'
    FacekeyChallengeCancelled:
      description: Facekey challenge was cancelled successfully
    BadVerificationRequestErrorResponse:
      description: Bad verification start request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/LoginIdValidationError'
              - $ref: '#/components/schemas/LoginIdTypeNotSupportedError'
              - $ref: '#/components/schemas/MissingChannelError'
              - $ref: '#/components/schemas/UnknownError'
    BadCompleteVerificationRequestErrorResponse:
      description: Bad request while completing a verification challenge.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/InvalidChallengeError'
              - $ref: '#/components/schemas/MaximumAttemptsReachedError'
              - $ref: '#/components/schemas/VerificationCodeWrongError'
              - $ref: '#/components/schemas/UnknownError'
    BadResendRequestErrorResponse:
      description: Bad request while resending a verification challenge code.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/InvalidChallengeError'
              - $ref: '#/components/schemas/MaximumResendAttemptsReachedError'
              - $ref: '#/components/schemas/UnknownError'
    PhoneVerificationCancelled:
      description: Phone LoginIdVerification was cancelled successfully
    EmailVerificationCancelled:
      description: Email LoginIdVerification was cancelled successfully
    OidcCancelled:
      description: Challenge was cancelled successfully
    BadIdDocVerificationRequestErrorResponse:
      description: Bad verification start request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/LoginIdValidationError'
              - $ref: '#/components/schemas/LoginIdTypeNotSupportedError'
              - $ref: '#/components/schemas/MissingChannelError'
              - $ref: '#/components/schemas/UnknownError'
    BadCompleteIdDocVerificationRequestErrorResponse:
      description: Bad request while completing a verification challenge.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/InvalidChallengeError'
              - $ref: '#/components/schemas/MaximumAttemptsReachedError'
              - $ref: '#/components/schemas/VerificationCodeWrongError'
              - $ref: '#/components/schemas/UnknownError'
    BadCompleteIdDocVerificationChallengeFailedErrorResponse:
      description: >-
        The verification process failed to verify the identity or the
        document(s).
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/TimeoutError'
              - $ref: '#/components/schemas/InvalidArgumentError'
              - $ref: '#/components/schemas/UnknownError'
    IdDocVerificationCancelled:
      description: Verification was cancelled successfully
  parameters:
    FlowTokenVerifier:
      in: header
      name: X-OwnID-Token-Verifier
      description: The plain secret used to verify a flow was initiated by same actor.
      schema:
        type: string
      required: false
    FlowTokenChallenge:
      in: header
      name: X-OwnID-Token-Challenge
      description: The encrypted challenge used to initiate a verifiable flow.
      schema:
        type: string
      required: false
  securitySchemes:
    AccessTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
